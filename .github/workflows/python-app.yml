name: Python application

on:
  push:
    branches: [ "develop_x" ]
  
jobs:
  Build:
    name: Compilar Projeto
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Testando o Codigo
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
       
    - name: Executar o pytest no projeto
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short
    
    - name: Resumo do Build
      run: |
          echo "## ✅ Resumo Compilação" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
  
  Imagem:
    name: Construindo Imagem para Docker
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push Docker
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ngaloni/senai_fastapi:latest
            ngaloni/senai_fastapi:${{ github.sha }}

      - name: Resumo do deploy
        run: |
           echo "## ✅ Imagem publicada no Docker Hub" >> $GITHUB_STEP_SUMMARY
           echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

    
  Deploy:
    name: Implantação AWS
    runs-on: ubuntu-latest
    needs: Imagem
    
    steps:
      - name: Deploy via SSH na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
             host: ${{ secrets.EC2_HOST }}
             username: ${{ secrets.EC2_USERNAME }}
             key: ${{ secrets.EC2_SSH_KEY }}
             #envs: IMAGE_NAME,CONTAINER_NAME,APP_PORT
             script: |
                 # Faz pull da nova imagem
                 docker pull ngaloni/senai_fastapi:latest
                 # Para e remove o container atual (ignora erro se não existir)
                 docker stop senai_fastapi 2>/dev/null || true
                 docker rm senai_fastapi 2>/dev/null || true
                 # Sobe o novo containe
                 docker run -d \
                  --name senai_fastapi \
                  --restart unless-stopped \
                  -p 8080:8080 \
                  ngaloni/senai_fastapi:latest
                  
                  # Health check pós-deploy
                  
                  sleep 5
                  curl -f http://localhost:8080/health || exit 1
                  echo "✅ Deploy concluído com sucesso!"
                  # Remove imagens antigas (economiza espaço em disco)
                  docker image prune -f

    
