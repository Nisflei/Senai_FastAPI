name: Python application

on:
  push:
    branches: [ "develop_x" ]
  
jobs:
  Build:
    name: Compilar Projeto
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Testando o Codigo
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
       
    - name: Executar o pytest no projeto
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short
    
    - name: Resumo do Build
      run: |
          echo "## ✅ Resumo Compilação" >> $GITHUB_STEP_SUMMARY
          echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
  
  Imagem:
    name: Construindo Imagem para Docker
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push Docker
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ngaloni/senai_fastapi:latest
            ngaloni/senai_fastapi:${{ github.sha }}

      - name: Resumo do deploy
        run: |
           echo "## ✅ Imagem publicada no Docker Hub" >> $GITHUB_STEP_SUMMARY
           echo "Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

    
